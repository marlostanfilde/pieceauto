<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier Pièces - Contact</title>
  <meta name="description" content="Contact simple pour un site de pièces auto sobre et professionnel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-frame">
    <header class="site-header">
      <a class="logo" href="index.html">
        <span>AP</span>
        <div>
          <strong>Atelier Pièces</strong>
          <small>Auto parts selection</small>
        </div>
      </a>

      <nav class="main-nav">
        <a href="index.html">Accueil</a>
        <a href="recherche.html">Recherche</a>
        <a href="catalogue.html">Catalogue</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </header>

    <main>
      <section class="page-intro">
        <p class="eyebrow">CONTACT</p>
        <h1>Une prise de contact simple et directe.</h1>
      </section>

      <section class="contact-minimal-grid">
        <form class="contact-card">
          <input type="text" placeholder="Nom">
          <input type="text" placeholder="Téléphone">
          <input type="email" placeholder="Email">
          <textarea rows="5" placeholder="Votre demande"></textarea>
          <button type="button" class="button light">Envoyer</button>
        </form>

        <article class="image-card contact-image">
          <img src="https://images.unsplash.com/photo-1625047509248-ec889cbff17f?auto=format&fit=crop&w=1200&q=80" alt="Atelier automobile professionnel">
        </article>
      </section>
    </main>
  </div>
</body>
</html>
